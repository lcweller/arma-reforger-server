version: '3.8'

services:
  arma-reforger:
    image: ghcr.io/lcweller/arma-reforger-server:latest
    container_name: arma-reforger-server
    restart: unless-stopped

    volumes:
      - ./arma-reforger:/app/data

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

volumes:
  server_data:
    driver: local
  server_logs:
    driver: local